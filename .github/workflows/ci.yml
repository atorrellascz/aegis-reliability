name: CI

# Run on every push to main and on pull requests targeting main.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven   # cache ~/.m2 so builds after the first are fast

      # The test suite mocks Redis/LLM and uses @WebMvcTest, so it needs no live
      # services -- no Docker, no Postgres, no Redis. That is what keeps CI fast
      # and deterministic.
      - name: Run tests
        run: mvn -B test
